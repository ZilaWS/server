name: Release & Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: write

jobs:
  release:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout server
        uses: actions/checkout@v4
        with:
          path: server

      - name: Checkout client (cross-dependency)
        uses: actions/checkout@v4
        with:
          repository: ZilaWS/client
          path: client
          # If the client repo ever becomes private, provide a PAT with read
          # access here, e.g. token: ${{ secrets.CROSS_REPO_TOKEN }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install server dependencies
        working-directory: server
        run: bun install

      - name: Install client dependencies
        working-directory: client
        run: bun install

      - name: Register bun links
        run: |
          cd server && bun link
          cd ../client && bun link

      - name: Build zilaws-server package
        working-directory: server
        run: bun run build:cjs && bun run build:esm && bun run build:types

      - name: Link zilaws-server into client
        working-directory: client
        run: bun link zilaws-server

      - name: Build zilaws-client
        working-directory: client
        run: bun run build:cjs && bun run build:esm && bun run build:umd && bun run build:types

      - name: Link zilaws-client into server
        working-directory: server
        run: bun link zilaws-client

      # Puppeteer's bundled Chrome + the system libraries it needs to launch
      # headless on the runner (used by the client browser tests).
      - name: Install Chrome for Puppeteer
        working-directory: client
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
            libgbm1 libasound2 libpango-1.0-0 libcairo2 libatspi2.0-0
          bunx puppeteer browsers install chrome

      - name: Run server tests (bun)
        working-directory: server
        run: bun test

      - name: Run client tests (bun)
        working-directory: client
        run: bun run test:bun:all

      # No token and no --provenance flag: trusted publishing authenticates via
      # OIDC and generates provenance automatically for public repos/packages.
      - name: Publish to npm (trusted publishing)
        working-directory: server
        run: npm publish

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          body_path: server/CHANGELOG.md
